<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — Angelly Parra</title>
    <link rel="icon" type="image/webp" href="./Fotos Angelly/Logo fondo oscuro.webp">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="index.css">
    
    <style>
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
            flex-direction: column;
        }
        
        .error-code {
            font-family: var(--font-display);
            font-size: clamp(6rem, 15vw, 12rem);
            color: var(--pink);
            line-height: 1;
            margin-bottom: 1rem;
        }
        
        .error-message {
            font-family: var(--font-body);
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--text-secondary);
            margin-bottom: 2rem;
            max-width: 500px;
            padding: 0 1rem;
        }
        
        .home-btn {
            display: inline-block;
            background: var(--pink);
            color: var(--bg-primary);
            padding: 1rem 2.5rem;
            font-family: var(--font-body);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
            border-radius: 4px;
            transition: background 0.3s;
        }
        
        .home-btn:hover {
            background: var(--pink-light);
        }
    </style>
</head>
<body>
    <div class="error-code">404</div>
    <div class="error-message">Vaya, parece que te saliste del encuadre. La foto que buscas no existe o ha sido movida.</div>
    <a href="/" class="home-btn">Volver al Inicio</a>
</body>
</html>
